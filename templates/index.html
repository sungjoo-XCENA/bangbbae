<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bangbbae</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #09090b;
  --card-bg:     #18181b;
  --border:      #27272a;
  --border-hover:#3f3f46;
  --text-primary:#fafafa;
  --text-secondary:#a1a1aa;
  --text-muted:  #71717a;
  --accent:      #3b82f6;
  --green:       #22c55e;
  --orange:      #f59e0b;
  --red:         #ef4444;
  --font-sans:  -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-mono:  "JetBrains Mono", "Fira Code", ui-monospace, monospace;
  --radius:     12px;
  --card-pad:   20px;
  --gap:        16px;
}

html {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

body { min-height: 100vh; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; border-bottom: 1px solid var(--border);
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
.header-time { font-size: 13px; color: var(--text-muted); }
.live-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:0.4 } }
.btn {
  padding: 8px 16px; font-size: 13px; font-weight: 500; border: 1px solid var(--border);
  border-radius: 8px; background: var(--card-bg); color: var(--text-secondary);
  cursor: pointer; transition: all 150ms;
}
.btn:hover { border-color: var(--border-hover); color: var(--text-primary); }

.main { max-width: 960px; margin: 0 auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

.gauge-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap); }
.gauge-card {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: var(--card-pad);
}
.gauge-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.gauge-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
.gauge-value { font-size: 22px; font-weight: 700; }
.gauge-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.06); overflow: hidden; }
.gauge-fill { height: 100%; border-radius: 3px; transition: width 500ms ease; }
.gauge-detail { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

.card {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: var(--card-pad);
}
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.card-subtitle { font-size: 12px; color: var(--text-muted); font-weight: 400; }

.user-item {
  border: 1px solid var(--border); border-radius: 8px; padding: 16px;
  margin-bottom: 12px; background: rgba(0,0,0,0.2); transition: border-color 150ms;
}
.user-item:last-child { margin-bottom: 0; }
.user-item.warn { border-color: rgba(245,158,11,0.3); }
.user-item.crit { border-color: rgba(239,68,68,0.3); }
.user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.user-name { font-size: 14px; font-weight: 600; }
.user-meta { font-size: 12px; color: var(--text-muted); }
.user-bars { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { width: 36px; font-size: 12px; color: var(--text-muted); font-weight: 500; flex-shrink: 0; }
.bar-track { flex: 1; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.06); overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 500ms ease; }
.bar-value { width: 120px; text-align: right; font-size: 12px; color: var(--text-secondary); flex-shrink: 0; }
.bar-badge { font-size: 11px; font-weight: 600; margin-left: 6px; }
.badge-warn { color: var(--orange); }
.badge-crit { color: var(--red); }
.fair-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.fair-badge {
  display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px;
  background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2);
  border-radius: 6px; font-size: 12px; font-weight: 500; color: var(--accent);
}
.fair-badge-label { color: var(--text-muted); }

.inactive-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.inactive-row:last-child { border-bottom: none; }
.inactive-left { display: flex; align-items: center; gap: 10px; }
.inactive-name { font-size: 13px; color: var(--text-secondary); }
.inactive-login { font-size: 12px; color: var(--text-muted); }
.inactive-disk { font-size: 12px; color: var(--text-muted); }

table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase;
     letter-spacing: 0.05em; padding: 8px 12px; border-bottom: 1px solid var(--border); }
th.r { text-align: right; }
td { font-size: 13px; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); color: var(--text-secondary); }
td.r { text-align: right; }
td.mono { font-family: var(--font-mono); font-size: 12px; }
tr:hover td { background: rgba(255,255,255,0.02); }

.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  align-items: center; justify-content: center; z-index: 1000;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 24px; width: 100%; max-width: 440px; margin: 16px;
}
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }
.modal-close:hover { color: var(--text-primary); }
.form-group { margin-bottom: 16px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-label { display: block; font-size: 12px; color: var(--text-muted); font-weight: 500; margin-bottom: 6px; }
.form-input {
  width: 100%; padding: 8px 12px; font-size: 13px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-primary); outline: none; transition: border-color 150ms;
}
.form-input:focus { border-color: var(--accent); }
.form-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-primary { flex: 1; padding: 10px; font-size: 13px; font-weight: 600; border: none; border-radius: 8px;
  background: var(--accent); color: white; cursor: pointer; transition: opacity 150ms; }
.btn-primary:hover { opacity: 0.9; }
.btn-secondary { flex: 1; padding: 10px; font-size: 13px; font-weight: 500; border: 1px solid var(--border);
  border-radius: 8px; background: var(--card-bg); color: var(--text-secondary); cursor: pointer; }
.btn-secondary:hover { border-color: var(--border-hover); color: var(--text-primary); }
.form-msg { font-size: 12px; text-align: center; margin-top: 12px; display: none; }

@media (max-width: 640px) {
  .gauge-row { grid-template-columns: 1fr; }
  .main { padding: 16px; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">Bangbbae</span>
    <span id="clock" class="header-time"></span>
    <span id="status-dot" class="live-dot"></span>
  </div>
  <button class="btn" onclick="openSettings()">Settings</button>
</div>

<div class="main">
  <div id="system-summary" class="gauge-row"></div>
  <div id="active-section" class="card">
    <div class="card-title" style="color:var(--text-muted)">Loading...</div>
  </div>
  <div id="inactive-section" class="card" style="display:none"></div>
  <div id="procs-section" class="card">
    <div class="card-title" style="color:var(--text-muted)">Loading...</div>
  </div>
</div>

<div id="settings-modal" class="modal-overlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="modal-title">
      Settings
      <button class="modal-close" onclick="closeSettings()">&times;</button>
    </div>
    <div class="form-group">
      <label class="form-label">Teams Webhook URL</label>
      <input id="s-webhook" type="text" class="form-input" placeholder="https://xxx.webhook.office.com/...">
    </div>
    <div class="form-row form-group">
      <div>
        <label class="form-label">Warning (% of fair share)</label>
        <input id="s-warning" type="number" class="form-input" placeholder="120">
      </div>
      <div>
        <label class="form-label">Critical (% of fair share)</label>
        <input id="s-critical" type="number" class="form-input" placeholder="150">
      </div>
    </div>
    <div class="form-row form-group">
      <div>
        <label class="form-label">Alert Cooldown (min)</label>
        <input id="s-cooldown" type="number" class="form-input" placeholder="5">
      </div>
      <div>
        <label class="form-label">Refresh Interval (sec)</label>
        <input id="s-refresh" type="number" class="form-input" placeholder="3">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Exclude Users (comma separated)</label>
      <input id="s-exclude" type="text" class="form-input" placeholder="guest, test">
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="testAlert()" id="btn-test">Send Test Alert</button>
      <button class="btn-primary" onclick="saveSettings()" id="btn-save">Save</button>
    </div>
    <div id="settings-msg" class="form-msg"></div>
  </div>
</div>

<script>
const REFRESH_MS = {{ refresh_interval }} * 1000;
let timer = null;

function colorByPct(pct) {
  if (pct >= 90) return 'var(--red)';
  if (pct >= 70) return 'var(--orange)';
  return 'var(--green)';
}

function alertColor(alerts, resource) {
  if (!alerts) return 'var(--green)';
  const a = alerts.find(x => x.resource === resource);
  if (!a) return 'var(--green)';
  return a.level === 'critical' ? 'var(--red)' : 'var(--orange)';
}

function alertBadge(alerts, resource) {
  if (!alerts) return '';
  const a = alerts.find(x => x.resource === resource);
  if (!a) return '';
  if (a.level === 'critical') return '<span class="bar-badge badge-crit">Exceeded</span>';
  return '<span class="bar-badge badge-warn">Warning</span>';
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function gaugeCard(label, pct, detail) {
  const color = colorByPct(pct);
  return `<div class="gauge-card">
    <div class="gauge-header">
      <span class="gauge-label">${label}</span>
      <span class="gauge-value" style="color:${color}">${pct}%</span>
    </div>
    <div class="gauge-bar">
      <div class="gauge-fill" style="width:${Math.min(pct,100)}%;background:${color}"></div>
    </div>
    <div class="gauge-detail">${detail}</div>
  </div>`;
}

function barRow(label, val, fairVal, unit, color) {
  const pct = fairVal > 0 ? Math.min(val / fairVal * 100, 100) : 0;
  const ratio = fairVal > 0 ? Math.round(val / fairVal * 100) : 0;
  const actual = unit === '%' ? val + '%' : val + unit;
  return `<div class="bar-row">
    <span class="bar-label">${label}</span>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <span class="bar-value">${ratio}% <span style="color:var(--text-muted)">(${actual})</span></span>
  </div>`;
}

function render(data) {
  const { time, system: s, fair, active, inactive, top_procs } = data;
  document.getElementById('clock').textContent = time;

  document.getElementById('system-summary').innerHTML =
    gaugeCard('CPU', s.cpu, s.cores + ' cores') +
    gaugeCard('RAM', s.ram_pct, s.ram_used + ' / ' + s.ram_total + ' GB') +
    gaugeCard('Disk', s.disk_pct, s.disk_used + ' / ' + s.disk_total + ' GB');

  const as = document.getElementById('active-section');
  if (active.length === 0) {
    as.innerHTML = '<div class="card-title" style="color:var(--text-muted)">No Active Users</div>';
  } else {
    let h = `<div class="card-title" style="flex-wrap:wrap">
      <span style="color:var(--green)">Active</span>
      <span>${active.length} users</span>
      <span style="color:var(--text-muted);font-size:12px;font-weight:400;margin:0 4px">—</span>
      <span style="font-size:12px;font-weight:400;color:var(--text-muted)">Per user limit</span>
      <div class="fair-badge"><span class="fair-badge-label">CPU</span> ${fair.cpu}%</div>
      <div class="fair-badge"><span class="fair-badge-label">RAM</span> ${fair.ram_gb}GB</div>
      <div class="fair-badge"><span class="fair-badge-label">Disk</span> ${fair.disk_gb}GB</div>
    </div>`;

    for (const u of active) {
      const hasAlert = u.alerts && u.alerts.length > 0;
      const cls = hasAlert ? (u.alerts.some(a => a.level==='critical') ? 'crit' : 'warn') : '';
      h += `<div class="user-item ${cls}">
        <div class="user-header">
          <span class="user-name">${u.name}</span>
          <span class="user-meta">${u.proc_count} processes</span>
        </div>
        <div class="user-bars">
          <div>${barRow('CPU', u.cpu, fair.cpu, '%', alertColor(u.alerts,'CPU'))}${alertBadge(u.alerts,'CPU')}</div>
          <div>${barRow('RAM', u.ram_gb, fair.ram_gb, 'GB', alertColor(u.alerts,'RAM'))}${alertBadge(u.alerts,'RAM')}</div>
          ${u.disk_gb >= 0
            ? '<div>' + barRow('Disk', u.disk_gb, fair.disk_gb, 'GB', alertColor(u.alerts,'Disk')) + alertBadge(u.alerts,'Disk') + '</div>'
            : '<div style="font-size:12px;color:var(--text-muted);margin-left:46px">Disk: No permission</div>'}
        </div>
      </div>`;
    }
    as.innerHTML = h;
  }

  const is_ = document.getElementById('inactive-section');
  if (inactive.length > 0) {
    is_.style.display = '';
    let h = `<div class="card-title">
      <span style="color:var(--text-muted)">Inactive</span>
      <span>${inactive.length} users</span>
      <span class="card-subtitle">No processes</span>
    </div>`;

    for (const u of inactive) {
      const diskAlert = u.alerts && u.alerts.length > 0;
      const diskStyle = diskAlert ? (u.alerts[0].level === 'critical' ? 'color:var(--red)' : 'color:var(--orange)') : '';
      const diskBadge = diskAlert ? (u.alerts[0].level === 'critical' ? ' <span class="badge-crit" style="font-size:11px;font-weight:600">Exceeded</span>' : ' <span class="badge-warn" style="font-size:11px;font-weight:600">Warning</span>') : '';
      const diskText = u.disk_gb >= 0 ? u.disk_gb + 'GB' + diskBadge : 'No permission';
      h += `<div class="inactive-row">
        <div class="inactive-left">
          <span class="inactive-name">${u.name}</span>
          <span class="inactive-login">Last login: ${u.last_login || 'Unknown'}</span>
        </div>
        <span class="inactive-disk" style="${diskStyle}">Disk: ${diskText}</span>
      </div>`;
    }
    is_.innerHTML = h;
  } else {
    is_.style.display = 'none';
  }

  const ps = document.getElementById('procs-section');
  if (top_procs.length === 0) {
    ps.innerHTML = '<div class="card-title" style="color:var(--text-muted)">No Processes</div>';
  } else {
    let h = `<div class="card-title">Top ${top_procs.length} Processes</div>
    <table>
      <thead><tr>
        <th>User</th><th>PID</th><th class="r">CPU</th><th class="r">RAM</th><th>Command</th>
      </tr></thead>
      <tbody>`;

    for (const p of top_procs) {
      const cpuRatio = fair.cpu > 0 ? p.cpu / fair.cpu * 100 : 0;
      const cpuStyle = cpuRatio >= 150 ? 'color:var(--red)' : cpuRatio >= 120 ? 'color:var(--orange)' : '';
      const ramVal = p.ram_mb >= 1024 ? (p.ram_mb/1024).toFixed(1) + 'GB' : Math.round(p.ram_mb) + 'MB';
      h += `<tr>
        <td>${p.user}</td>
        <td class="mono" style="color:var(--text-muted)">${p.pid}</td>
        <td class="r mono" style="${cpuStyle}">${p.cpu}%</td>
        <td class="r mono">${ramVal}</td>
        <td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(p.cmd)}</td>
      </tr>`;
    }
    h += '</tbody></table>';
    ps.innerHTML = h;
  }
}

async function fetchSnapshot() {
  try {
    const res = await fetch('/api/snapshot');
    if (!res.ok) throw new Error(res.status);
    render(await res.json());
    document.getElementById('status-dot').style.background = 'var(--green)';
  } catch {
    document.getElementById('status-dot').style.background = 'var(--red)';
  }
}

function startPolling(ms) {
  if (timer) clearInterval(timer);
  timer = setInterval(fetchSnapshot, ms);
  fetchSnapshot();
}

startPolling(REFRESH_MS);

async function openSettings() {
  document.getElementById('settings-modal').classList.add('open');
  hideMsg();
  try {
    const c = await (await fetch('/api/settings')).json();
    document.getElementById('s-webhook').value = c.teams_webhook || '';
    document.getElementById('s-warning').value = c.warning_percent || 120;
    document.getElementById('s-critical').value = c.critical_percent || 150;
    document.getElementById('s-cooldown').value = c.cooldown_minutes || 5;
    document.getElementById('s-refresh').value = c.refresh_interval || 3;
    document.getElementById('s-exclude').value = (c.exclude_users || []).join(', ');
  } catch {}
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
}

function showMsg(text, ok) {
  const el = document.getElementById('settings-msg');
  el.textContent = text;
  el.style.display = 'block';
  el.style.color = ok ? 'var(--green)' : 'var(--red)';
  setTimeout(hideMsg, 3000);
}

function hideMsg() {
  document.getElementById('settings-msg').style.display = 'none';
}

async function saveSettings() {
  const exclude = document.getElementById('s-exclude').value.split(',').map(s => s.trim()).filter(Boolean);
  const refreshVal = parseInt(document.getElementById('s-refresh').value) || 3;
  const body = {
    teams_webhook: document.getElementById('s-webhook').value.trim(),
    warning_percent: parseInt(document.getElementById('s-warning').value) || 120,
    critical_percent: parseInt(document.getElementById('s-critical').value) || 150,
    cooldown_minutes: parseInt(document.getElementById('s-cooldown').value) || 5,
    refresh_interval: refreshVal,
    exclude_users: exclude,
  };
  try {
    const res = await fetch('/api/settings', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if (res.ok) { showMsg('Saved', true); startPolling(refreshVal * 1000); }
    else showMsg('Save failed', false);
  } catch { showMsg('Save failed', false); }
}

async function testAlert() {
  const btn = document.getElementById('btn-test');
  btn.textContent = 'Sending...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/test-alert', { method:'POST' });
    const data = await res.json();
    if (res.ok) showMsg('Test alert sent', true);
    else showMsg(data.error || 'Send failed', false);
  } catch { showMsg('Send failed', false); }
  finally { btn.textContent = 'Send Test Alert'; btn.disabled = false; }
}
</script>

</body>
</html>
